# ============================================================================
# RESPONSE-999-EXCEPTIONS.conf
# Purpose: Disable ALL standard CRS rules EXCEPT the blocking evaluation
#          rule (949110) and our custom XSS-GENERALIZED rules (9941xxx).
# ============================================================================

# Disable IP reputation
SecRuleRemoveById 910000-910999

# Disable scanner detection
SecRuleRemoveById 913000-913999

# Disable Protocol Enforcement (causes FP on long text, special chars)
SecRuleRemoveById 920000-920999

# Disable LFI/RFI/RCE rules
SecRuleRemoveById 930000-934999

# Disable all standard XSS rules (we use custom 9941xxx)
SecRuleRemoveById 941000-941999

# Disable all SQLi rules
SecRuleRemoveById 942000-942999

# Disable session fixation
SecRuleRemoveById 943000-943999

# Disable Java attack rules
SecRuleRemoveById 944000-944999

# Disable response data leakage rules
SecRuleRemoveById 950000-959999

# NOTE: We KEEP these rules active:
#   - 949110: Inbound Anomaly Score Evaluation (REQUIRED for blocking)
#   - 9941000-9941099: Our Custom Generalized XSS rules
