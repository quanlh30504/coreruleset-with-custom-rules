# ============================================================================
# OWASP CRS - Generalized XSS Detection Rules (v4 - OPTIMIZED)
# Rule ID Range: 9941000-9941060
# ============================================================================
# v4 Changelog:
#   - Fixed FP: Rule 9941002 now requires <script> with suspicious payload 
#     context (not just any <script> tag)
#   - Fixed FP: Rule 9941005 (data: URI) now requires execution context
#   - Fixed Bypass: Added double-decoded HTML entity detection (rule 9941008)
#   - Fixed Bypass: Added URL open-redirect/XSS-in-URL detection (rule 9941009)
#   - Fixed Bypass: Added HTML named entity detection (rule 9941010)
#   - Fixed FP: Rule 9941004 now excludes benign document.createElement patterns
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURATION
# ----------------------------------------------------------------------------
SecAction \
    "id:9941000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.xss_score=0'"

# ============================================================================
# LAYER 1: FOUNDATIONAL XSS DETECTION
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941002: Script & Dangerous HTML Tag Injection
# Broad detection: catches any <script tag with > or src=
# Also catches dangerous tags: <svg>, <iframe>, <embed>, <object>, <body>
# Tags like <img>, <input>, <a>, <meta> only blocked if on*= present
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:<script[^>]*(?:>|\b(?:src|href)\s*=)|</script>|<(?:svg|iframe|object|embed|applet|form|isindex|body|details|marquee|math|layer|xml|xss\b)\b[^>]*(?:>|on\w+\s*=)|<(?:img|video|audio|input|button|select|textarea|keygen|source|a\b|meta|link|base|style)\b[^>]*\bon\w+\s*=|<\w+[^>]*\bstyle\s*=\s*[^>]*(?:expression|behavior|url|import|-moz-binding)\s*\()" \
    "id:9941002,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Tag Injection Detected',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/HTML_TAG'"

# ----------------------------------------------------------------------------
# Rule 9941003: Generic Event Handler Detection (on[event]=)
# Catches: on[anything]= with any execution context
# This is the CORE generalized rule
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)\bon[a-z]{2,25}\s*=\s*[^\s>]*(?:alert|confirm|prompt|eval|atob|function|constructor|settimeout|setinterval|document|window|location|this|self|top|parent|fetch|xmlhttp|[\(\[`])" \
    "id:9941003,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Event Handler with Execution Context',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/EVENT_HANDLER'"

# ----------------------------------------------------------------------------
# Rule 9941004: Dangerous JS Function Call Detection  
# Catches: alert(1), confirm(x), prompt(x)
# Catches: document.cookie, document.write, document.domain
# DOES NOT match: document.getElementById, document.createElement
# DOES NOT match: window.location (causes FP in benign redirect code)
# DOES NOT match: window.name (causes FP in benign code)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:(?:alert|confirm|prompt)\s*\(|(?:eval|settimeout|setinterval)\s*\(\s*['\"`\[]|document\.(?:cookie|domain|write(?:ln)?)|\.(?:innerhtml|outerhtml|insertadjacenthtml|srcdoc)\s*[+]?=|\.(?:href|src|action|formaction)\s*=\s*['\"]?\s*(?:javascript|vbscript):)" \
    "id:9941004,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Dangerous JS Function/Property',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/JS_FUNCTION'"

# ----------------------------------------------------------------------------
# Rule 9941005: Protocol URI XSS (javascript:, vbscript:)
# CHANGED: Removed "data:" from this rule to reduce FP. 
# data: URI is handled separately in rule 9941011 with execution context.
# Handles whitespace bypass: java\t\nscript:
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:j\s*a\s*v\s*a\s*s\s*c\s*r\s*i\s*p\s*t|v\s*b\s*s\s*c\s*r\s*i\s*p\s*t)\s*:" \
    "id:9941005,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Protocol URI Injection (javascript:/vbscript:)',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/PROTOCOL_URI'"

# ----------------------------------------------------------------------------
# Rule 9941006: HTML Tag with Any Event Handler (broad catch)
# Catches: <tag onload=x>, <tag onerror=x> - any event handler on any tag
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)<[a-z]\w*[^>]*\bon[a-z]{2,25}\s*=" \
    "id:9941006,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Tag with Event Handler',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/TAG_EVENT'"

# ----------------------------------------------------------------------------
# Rule 9941007: JS Constructor/Prototype Chain
# Catches: constructor.constructor('alert(1)')(), __proto__, prototype[
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:constructor\s*[\(\[.]|__proto__|prototype\s*[\[.]|\.constructor\s*\()" \
    "id:9941007,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Constructor/Prototype Chain Exploitation',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/CONSTRUCTOR'"

# ============================================================================
# LAYER 2: BYPASS-RESISTANT DETECTION (NEW/IMPROVED)
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941008: HTML Named Entity XSS Detection
# NEW: Catches payloads using &colon; &lpar; &rpar; &lt; &gt; etc.
# Example: <a href=javascript&colon;alert&lpar;1&rpar;>
# These bypass t:htmlEntityDecode when double-encoded from URLs
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:&(?:colon|#58|#x3a);?\s*(?:alert|confirm|prompt|eval|document)|(?:alert|confirm|prompt|eval)\s*&(?:lpar|#40|#x28);?|&(?:lt|#60|#x3c);?\s*(?:script|svg|img|iframe|body|object|embed|input|form|a\b|div|meta|link|style|base)|on\w+\s*&(?:equals|#61|#x3d);?)" \
    "id:9941008,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: HTML Named Entity Bypass Detected',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/NAMED_ENTITY'"

# ----------------------------------------------------------------------------  
# Rule 9941009: Open Redirect / XSS-in-URL Detection
# NEW: Catches full URLs that redirect to XSS domains or contain XSS in params
# Matches: url=http://xssed.com, dest=http://evil.com, &redirect=//evil
# Also catches: %3cscript%3e in URL parameters (percent-encoded XSS)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:(?:url|dest|redirect|referer|returnurl|go|redir|forward|target|link|site|domain|callback|next|return|continue)\s*=\s*(?:https?://|//|\\\\)[^&\s]*(?:xss|alert|script|eval|hack|exploit|evil)|%(?:22|27|3c|3e)(?:%(?:22|27|3c|3e|20|09)|\w)*(?:%3c|<)\s*(?:script|svg|img|iframe|body))" \
    "id:9941009,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Suspicious URL Redirect/XSS-in-URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URL_REDIRECT'"

# ----------------------------------------------------------------------------
# Rule 9941010: Percent-Encoded XSS in URL Parameters (double-encoded)
# NEW: Only scans ARGS/ARGS_GET (not REQUEST_URI) to avoid FP
# Requires the presence of percent-encoded angle brackets
# Applies double URL decode to catch double-encoding
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET "@rx (?i)%3c\s*(?:script|svg|iframe|img|body|embed|object|input|form|details|marquee|math|isindex|layer|xml|xss)\b" \
    "id:9941010,\
    phase:2,\
    t:none,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Percent-Encoded HTML Injection in URL',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URL_ENCODED'"

# ----------------------------------------------------------------------------
# Rule 9941011: Data URI with Execution Context
# NEW (split from 9941005): data: URI only blocked when it has HTML/JS content
# Example: data:text/html,<script>alert(1)</script>
# Will NOT match: data:image/png;base64,... (benign)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)d\s*a\s*t\s*a\s*:\s*(?:text/html|application/x|text/xml|text/javascript|image/svg)[^,]*[,;]" \
    "id:9941011,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Data URI with Executable Content',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/DATA_URI'"

# ----------------------------------------------------------------------------
# Rule 9941012: Style-based XSS (expression, behavior, url)
# Catches: style="background:url(javascript:alert(1))"
# Catches: -moz-binding:url(...), expression(...)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:style\s*=\s*[^>]*(?:expression|behavior|-moz-binding|@import)\s*\(|style\s*=\s*[^>]*url\s*\(\s*['\"]?\s*(?:javascript|data|vbscript):)" \
    "id:9941012,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Style-based Code Injection',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/STYLE_INJECT'"

# ============================================================================
# LAYER 3: ADVANCED BYPASS DETECTION
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941020: String Concatenation with Partial Function Names
# Catches: 'ale'+'rt'(1), eval('al'+'ert(1)')
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:(?:setinterval|settimeout|function)\s*\(\s*['\"][^'\"]*\+[^'\"]*['\"]|['\"](?:ale|ert|lert|pro|mpt|ompt|con|irm|firm|eva|val)\s*['\"][^'\"]*\+|['\"]?\s*-\s*(?:alert|confirm|prompt|eval)\s*\(|\(\s*['\"]?\s*\+\s*['\"]?\s*(?:rt|mpt|irm|val)\s*\(\))" \
    "id:9941020,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: String Concatenation Bypass',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/CONCAT'"

# ----------------------------------------------------------------------------
# Rule 9941021: Inline Tag Breaking XSS Detection
# Catches: autof<x>ocus o<x>nfocus=alert<x>(1)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:o\s*<[^>]*>\s*n\s*(?:focus|load|error|click|mouse)|a\s*<[^>]*>\s*l\s*<[^>]*>\s*e\s*<[^>]*>\s*r\s*<[^>]*>\s*t|s\s*<[^>]*>\s*c\s*<[^>]*>\s*r\s*<[^>]*>\s*i\s*<[^>]*>\s*p\s*<[^>]*>\s*t)" \
    "id:9941021,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:removeNulls,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Inline Tag Breaking Attack',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/TAG_BREAK'"

# ----------------------------------------------------------------------------
# Rule 9941023: Event Handler with Decoy Attributes
# Catches: <p only=1337 onmouseenter=...>
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:<\s*\w+[^>]*\s+\w+\s*=\s*[^>]*\s+on(?:mouse|key|focus|blur|load|error|click|touch|pointer|drag|scroll|wheel|copy|cut|paste|select|input|change|submit|reset|toggle|show|before|after|page)\w*\s*=)" \
    "id:9941023,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Event Handler with Decoy Attribute',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/EVENT_DECOY'"

# ----------------------------------------------------------------------------
# Rule 9941024: JS Context Injection with Control Flow
# Catches: "));if(!self.x)self.x=!alert(...)}catch(e){}//
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:\)\s*\)\s*;?\s*(?:if|while|for|switch|try)\s*\(|\}?\s*catch\s*\(\s*\w*\s*\)\s*\{|=\s*!\s*(?:alert|confirm|prompt|eval)\s*\(|self\s*\.\s*\w+\s*=\s*!\s*(?:alert|confirm|prompt)|throw\s+(?:0|1|null|true|false)\s*;?\s*(?:alert|confirm|prompt))" \
    "id:9941024,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: JS Context Injection with Control Flow',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/JS_CONTEXT'"

# ----------------------------------------------------------------------------
# Rule 9941025: Obfuscated Script Tags
# Catches: <<scr[NULL]ipt, <scr ipt, script/src=
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:<\s*<+\s*scr|<\s*scr\s*ipt|scr\x00ipt|script\s*/\s*src\s*=)" \
    "id:9941025,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:base64Decode,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Obfuscated Script Tag',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/SCRIPT_OBFUSC'"

# ----------------------------------------------------------------------------
# Rule 9941026: JS Execution via Bracket/Backtick Notation
# NEW: Catches: window['alert'](1), this[`alert`](1), [1].map(alert)
# Also: $=alert,$(1); x=confirm;x(1)
# ----------------------------------------------------------------------------
SecRule ARGS|ARGS_GET|REQUEST_URI "@rx (?i)(?:\[\s*['\"`]\s*(?:alert|confirm|prompt|eval|constructor|Function)\s*['\"`]\s*\]|=\s*(?:alert|confirm|prompt|eval)\s*[,;]|\b(?:map|filter|find|forEach|some|every|reduce)\s*\(\s*(?:alert|confirm|prompt|eval)\s*\)|(?:top|window|self|this|parent|frames)\s*\[\s*['\"`])" \
    "id:9941026,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Bracket/Backtick Notation Execution',\
    logdata:'Payload: %{MATCHED_VAR}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/BRACKET_EXEC'"

# ============================================================================
# LAYER 4: URL PATH ANALYSIS  
# ============================================================================

# ----------------------------------------------------------------------------
# Rule 9941050: Capture URL Path for XSS Analysis
# ----------------------------------------------------------------------------
SecRule REQUEST_URI "@rx ^.*/([^/]+)$" \
    "id:9941050,\
    phase:2,\
    nolog,\
    pass,\
    capture,\
    t:none,\
    setvar:'tx.xss_urlpath_raw=%{TX.1}'"

# ----------------------------------------------------------------------------
# Rule 9941051: Decode URL Path for Analysis
# ----------------------------------------------------------------------------
SecRule TX:xss_urlpath_raw "@rx .+" \
    "id:9941051,\
    phase:2,\
    nolog,\
    pass,\
    capture,\
    t:none,\
    t:base64Decode,\
    t:htmlEntityDecode,\
    setvar:'tx.xss_urlpath_decoded=%{MATCHED_VAR}'"

# ----------------------------------------------------------------------------
# Rule 9941052: XSS in URL Path (decoded)
# Same patterns as Layer 1 applied to decoded URL path
# ----------------------------------------------------------------------------
SecRule TX:xss_urlpath_raw|TX:xss_urlpath_decoded "@rx (?i)(?:<script|<svg|<iframe|<img|<body|<embed|<object|on\w+\s*=|javascript:|alert\s*\(|confirm\s*\(|prompt\s*\(|eval\s*\(|document\.|window\.)" \
    "id:9941052,\
    phase:2,\
    t:none,\
    t:urlDecodeUni,\
    t:htmlEntityDecode,\
    t:jsDecode,\
    t:removeNulls,\
    t:compressWhitespace,\
    t:lowercase,\
    deny,status:403,\
    msg:'XSS: Malicious Payload in URL Path',\
    logdata:'Decoded: %{TX.xss_urlpath_decoded}',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'OWASP_CRS/XSS/URLPATH'"
